<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的观影记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="grain"></div>
  <div class="glow glow-a"></div>
  <div class="glow glow-b"></div>

  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">🎬</span>
        <div>
          <h1>我的观影记录</h1>
          <p class="subtitle">记录每一帧光影</p>
        </div>
      </div>
      <button class="btn btn-primary" id="btnAdd">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        添加电影
      </button>
    </div>
  </header>

  <main class="main">
    <section class="stats" id="stats">
      <div class="stat-card">
        <span class="stat-num" id="statTotal">0</span>
        <span class="stat-label">已看影片</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="statAvg">—</span>
        <span class="stat-label">平均评分</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="statBest">—</span>
        <span class="stat-label">最高评分</span>
      </div>
    </section>

    <section class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="searchInput" placeholder="搜索电影名、导演、标签…" autocomplete="off">
      </div>
      <div class="toolbar-actions">
        <select id="sortSelect" class="select">
          <option value="date-desc">最近添加</option>
          <option value="rating-desc">评分从高到低</option>
          <option value="rating-asc">评分从低到高</option>
          <option value="title-asc">片名 A→Z</option>
          <option value="watch-desc">观影日期</option>
        </select>
        <button class="btn btn-ghost" id="btnExport" title="导出备份">导出</button>
        <button class="btn btn-ghost" id="btnImport" title="导入备份">导入</button>
        <input type="file" id="importFile" accept=".json" hidden>
      </div>
    </section>

    <section class="movie-grid" id="movieGrid"></section>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🎞️</div>
      <h2>还没有记录</h2>
      <p>点击「添加电影」，开始建立你的私人片单</p>
      <button class="btn btn-primary" id="btnAddEmpty">添加第一部电影</button>
    </div>
  </main>

  <footer class="footer">
    <p>数据保存在本机浏览器 · 建议定期导出备份</p>
  </footer>

  <!-- 添加/编辑弹窗 -->
  <dialog class="modal" id="movieModal">
    <form id="movieForm" method="dialog">
      <div class="modal-header">
        <h2 id="modalTitle">添加电影</h2>
        <button type="button" class="btn-close" id="btnCloseModal" aria-label="关闭">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label class="field field-full">
            <span>片名 <em>*</em></span>
            <input type="text" id="inputTitle" required placeholder="例如：肖申克的救赎" maxlength="120">
          </label>
        </div>
        <div class="form-row two-col">
          <label class="field">
            <span>导演</span>
            <input type="text" id="inputDirector" placeholder="弗兰克·德拉邦特" maxlength="80">
          </label>
          <label class="field">
            <span>年份</span>
            <input type="number" id="inputYear" placeholder="1994" min="1888" max="2099">
          </label>
        </div>
        <div class="form-row two-col">
          <label class="field">
            <span>观影日期</span>
            <input type="date" id="inputWatchDate">
          </label>
          <label class="field">
            <span>类型 / 标签</span>
            <input type="text" id="inputGenre" placeholder="剧情, 犯罪" maxlength="80">
          </label>
        </div>
        <label class="field field-full">
          <span>海报链接（可选）</span>
          <input type="url" id="inputPoster" placeholder="https://…">
        </label>
        <div class="rating-field">
          <div class="rating-header">
            <span>我的评分 <em>*</em></span>
            <span class="rating-display" id="ratingDisplay">8.0</span>
          </div>
          <input type="range" id="inputRating" min="0" max="100" value="80" step="5">
          <div class="rating-scale">
            <span>0</span><span>5</span><span>10</span>
          </div>
        </div>
        <label class="field field-full">
          <span>短评</span>
          <textarea id="inputReview" rows="3" placeholder="写几句感受…" maxlength="500"></textarea>
        </label>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-danger hidden" id="btnDelete">删除</button>
        <div class="modal-footer-right">
          <button type="button" class="btn btn-ghost" id="btnCancel">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </div>
    </form>
  </dialog>

  <!-- 详情弹窗 -->
  <dialog class="modal modal-detail" id="detailModal">
    <button type="button" class="btn-close detail-close" id="btnCloseDetail" aria-label="关闭">&times;</button>
    <div class="detail-content" id="detailContent"></div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
