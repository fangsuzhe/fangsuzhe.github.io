<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>口味档案</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=42">
  <script src="js/assets.js?v=6"></script>
</head>
<body>
  <div class="site-wallpaper" aria-hidden="true">
    <img id="siteWallpaper" src="" alt="" fetchpriority="high" decoding="async" width="1920" height="1080">
  </div>
  <script>SiteAssets.bindWallpaper('#siteWallpaper');</script>
  <div class="grain"></div>
  <div class="glow glow-a"></div>
  <div class="glow glow-b"></div>
  <div class="glow glow-c"></div>

  <header class="header">
    <div class="header-shell">
      <div class="brand">
        <img class="brand-mark" id="brandAvatar" src="" alt="" width="44" height="44" decoding="async" aria-hidden="true">
        <div>
          <p class="brand-kicker">Personal Space</p>
          <h1 id="pageTitle">口味档案</h1>
          <p class="subtitle hidden" id="pageSubtitle"></p>
        </div>
      </div>
      <nav class="site-tabs" id="siteTabs" aria-label="站点分区"></nav>
    </div>
  </header>
  <script>SiteAssets.bindBrandAvatar('#brandAvatar');</script>

  <main class="main">
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <p>加载中…</p>
    </div>

    <div class="tab-panel" id="tabPanelMovies" data-tab="movies">
      <nav class="sub-tabs" id="movieSubTabs" data-space="movies" aria-label="电影空间分区"></nav>

      <div class="sub-panel active" data-space="movies" data-sub="records" id="subPanelRecords">
      <div class="page-content hidden" id="pageContent">

        <section class="dashboard">
          <div class="dash-stats stats stats--two">
            <div class="stat-card">
              <span class="stat-label">已看影片</span>
              <span class="stat-num" id="statTotal">0</span>
            </div>
            <div class="stat-card stat-card--highlight">
              <span class="stat-label">击碎我的 · 10 分</span>
              <span class="stat-num" id="statPerfect">0</span>
            </div>
          </div>

          <section class="filter-panel dash-panel">
            <div class="filter-panel-head">
              <div>
                <h2 class="panel-title">浏览与筛选</h2>
                <p class="panel-desc">按评分档位浏览，支持搜索与排序</p>
              </div>
            </div>
            <div class="rating-filters-scroll">
              <div class="rating-filters" id="ratingFilters"></div>
            </div>
            <div class="toolbar">
              <div class="search-wrap">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="search" id="searchInput" placeholder="搜索片名、导演、标签…" autocomplete="off">
              </div>
              <select id="sortSelect" class="select" aria-label="排序方式">
                <option value="rating-desc">评分从高到低</option>
                <option value="date-desc">最近添加</option>
                <option value="rating-asc">评分从低到高</option>
                <option value="title-asc">片名 A→Z</option>
              </select>
            </div>
          </section>
        </section>

        <section class="catalog">
          <div class="catalog-head" id="catalogHead">
            <div>
              <p class="catalog-kicker">Movie Space</p>
              <h2 class="catalog-title" id="catalogTitle">全部影片</h2>
            </div>
            <span class="catalog-count" id="catalogCount"></span>
          </div>
          <div id="movieList"></div>
        </section>

        <div class="empty-state" id="emptyState">
          <div class="empty-icon">🎞️</div>
          <h2>没有符合条件的影片</h2>
          <p>试试切换评分档位或清空搜索</p>
        </div>
      </div>
      </div>

      <div class="sub-panel" data-space="movies" data-sub="taste" id="subPanelTaste">
        <div class="page-content taste-page" id="tasteContent"></div>
      </div>

      <div class="sub-panel" data-space="movies" data-sub="notes" id="subPanelNotes">
        <div class="page-content notes-page" id="notesContent"></div>
      </div>

      <div class="sub-panel" data-space="movies" data-sub="best" id="subPanelBest">
        <div class="page-content best-page" id="bestContent"></div>
      </div>
    </div>

    <div class="tab-panel" id="tabPanelDrama" data-tab="drama">
      <nav class="sub-tabs space-sub-tabs" data-space="drama" aria-label="剧空间分区"></nav>
      <div class="sub-panel active" data-space="drama" data-sub="records">
        <div class="page-content space-records-page" id="drama_records"></div>
      </div>
      <div class="sub-panel" data-space="drama" data-sub="best">
        <div class="page-content picks-page" id="drama_best"></div>
      </div>
    </div>
    <div class="tab-panel" id="tabPanelAnime" data-tab="anime">
      <nav class="sub-tabs space-sub-tabs" data-space="anime" aria-label="动漫空间分区"></nav>
      <div class="sub-panel active" data-space="anime" data-sub="records">
        <div class="page-content space-records-page" id="anime_records"></div>
      </div>
      <div class="sub-panel" data-space="anime" data-sub="best">
        <div class="page-content best-page" id="anime_best"></div>
      </div>
      <div class="sub-panel" data-space="anime" data-sub="characters">
        <div class="page-content characters-page" id="anime_characters"></div>
      </div>
      <div class="sub-panel hidden" data-space="anime" data-sub="r18" id="subPanelAnimeR18">
        <div class="page-content codes-page" id="anime_r18"></div>
      </div>
    </div>
    <div class="tab-panel" id="tabPanelText" data-tab="text">
      <nav class="sub-tabs space-sub-tabs" data-space="text" aria-label="文字空间分区"></nav>
      <div class="sub-panel active" data-space="text" data-sub="records">
        <div class="page-content space-records-page" id="text_records"></div>
      </div>
      <div class="sub-panel" data-space="text" data-sub="best">
        <div class="page-content best-page" id="text_best"></div>
      </div>
    </div>
    <div class="tab-panel" id="tabPanelMusic" data-tab="music">
      <nav class="sub-tabs space-sub-tabs" data-space="music" aria-label="音乐空间分区"></nav>
      <div class="sub-panel active" data-space="music" data-sub="records">
        <div class="page-content space-records-page" id="music_records"></div>
      </div>
      <div class="sub-panel" data-space="music" data-sub="best">
        <div class="page-content picks-page" id="music_best"></div>
      </div>
    </div>
    <div class="tab-panel" id="tabPanelIdol" data-tab="idol">
      <nav class="sub-tabs space-sub-tabs" data-space="idol" aria-label="女优空间分区"></nav>
      <div class="sub-panel active" data-space="idol" data-sub="records">
        <div class="page-content space-records-page" id="idol_records"></div>
      </div>
      <div class="sub-panel" data-space="idol" data-sub="best">
        <div class="page-content picks-page" id="idol_best"></div>
      </div>
      <div class="sub-panel" data-space="idol" data-sub="codes">
        <div class="page-content codes-page" id="idol_codes"></div>
      </div>
      <div class="sub-panel" data-space="idol" data-sub="links">
        <div class="page-content links-page" id="idol_links"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>口味档案 · GitHub Pages</p>
  </footer>

  <dialog class="modal modal-detail" id="detailModal">
    <div class="modal-detail-box">
      <button type="button" class="btn-close detail-close" id="btnCloseDetail" aria-label="关闭">&times;</button>
      <div class="detail-content" id="detailContent"></div>
    </div>
  </dialog>

  <script src="js/bgm.js?v=1"></script>
  <script src="js/cursor.js?v=2"></script>
  <script src="js/shared.js?v=39"></script>
  <script src="js/view.js?v=36"></script>
  <span id="statAvg" hidden aria-hidden="true"></span>
</body>
</html>
