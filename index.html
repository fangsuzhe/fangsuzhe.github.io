<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的观影记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="grain"></div>
  <div class="glow glow-a"></div>
  <div class="glow glow-b"></div>

  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">🎬</span>
        <div>
          <h1 id="pageTitle">我的观影记录</h1>
          <p class="subtitle" id="pageSubtitle">记录每一帧光影</p>
        </div>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <p>加载片单中…</p>
    </div>

    <div class="page-content hidden" id="pageContent">
      <!-- 概览 -->
      <section class="overview">
        <div class="stats">
          <div class="stat-card">
            <span class="stat-num" id="statTotal">0</span>
            <span class="stat-label">已看影片</span>
          </div>
          <div class="stat-card">
            <span class="stat-num" id="statAvg">—</span>
            <span class="stat-label">平均评分</span>
          </div>
          <div class="stat-card stat-card--highlight">
            <span class="stat-num" id="statPerfect">0</span>
            <span class="stat-label">击碎我的</span>
          </div>
        </div>
      </section>

      <!-- 筛选区 -->
      <section class="filter-panel">
        <div class="filter-panel-head">
          <h2 class="panel-title">按评分浏览</h2>
          <p class="panel-desc">0–10 分各档独立筛选，默认按分数分区展示</p>
        </div>
        <div class="rating-filters" id="ratingFilters"></div>

        <div class="toolbar">
          <div class="search-wrap">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="search" id="searchInput" placeholder="搜索片名、导演、标签…" autocomplete="off">
          </div>
          <select id="sortSelect" class="select">
            <option value="rating-desc">评分从高到低</option>
            <option value="date-desc">最近添加</option>
            <option value="rating-asc">评分从低到高</option>
            <option value="title-asc">片名 A→Z</option>
            <option value="watch-desc">观影日期</option>
          </select>
        </div>
      </section>

      <!-- 片单内容 -->
      <section class="catalog">
        <div class="catalog-head" id="catalogHead">
          <h2 class="catalog-title" id="catalogTitle">全部影片</h2>
          <span class="catalog-count" id="catalogCount"></span>
        </div>
        <div id="movieList"></div>
      </section>

      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎞️</div>
        <h2>没有符合条件的影片</h2>
        <p>试试切换评分档位或清空搜索</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>个人观影分享 · 只读浏览</p>
  </footer>

  <dialog class="modal modal-detail" id="detailModal">
    <button type="button" class="btn-close detail-close" id="btnCloseDetail" aria-label="关闭">&times;</button>
    <div class="detail-content" id="detailContent"></div>
  </dialog>

  <script src="js/shared.js"></script>
  <script src="js/view.js"></script>
</body>
</html>
